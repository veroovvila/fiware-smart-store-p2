version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: fiware-mongodb
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-root}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - fiware
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  orion:
    image: fiware/orion:latest
    container_name: fiware-orion
    ports:
      - "${ORION_PORT:-1026}:1026"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      DB_HOST: mongodb
      DB_USERNAME: ${MONGO_ROOT_USER:-root}
      DB_PASSWORD: ${MONGO_ROOT_PASSWORD:-root}
    command: "-dbURI mongodb://root:root@mongodb:27017/fiware_smartstore?authSource=admin"    
    networks:
      - fiware
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1026/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fiware-backend
    ports:
      - "${FLASK_PORT:-5000}:5000"
    depends_on:
      orion:
        condition: service_healthy
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_APP: app.py
      FLASK_DEBUG: ${FLASK_DEBUG:-True}
      ORION_URL: http://orion:1026
      MONGODB_URL: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-root}@mongodb:27017/
      MONGO_DB: ${MONGO_DB:-fiware_smartstore}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    networks:
      - fiware
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: nginx:alpine
    container_name: fiware-frontend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fiware
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
  mongodb_config:

networks:
  fiware:
    driver: bridge
